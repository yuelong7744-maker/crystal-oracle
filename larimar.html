<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Larimar — Stone Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=Noto+Serif+JP:wght@100;200;300&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  min-height:100%;
  background:#0e2a3f;
  font-family:'Noto Serif JP', serif;
  color:#e8f6fa;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

:root {
  --bg-top:    #0e2a3f;
  --bg-mid:    #153652;
  --bg-low:    #1a4260;
  --lari-sky:    #5bbcda;
  --lari-mid:    #7ecfde;
  --lari-pale:   #b0e4ef;
  --lari-foam:   #d8f3f8;
  --lari-white:  rgba(255,255,255,0.88);
  --lari-deep:   #2a88a8;
  --pearl:     rgba(232,246,250,0.90);
  --pearl-dim: rgba(232,246,250,0.48);
  --gold:      rgba(200,230,238,0.42);
  --shimmer:   rgba(255,255,255,0.60);
  --pad:       28px;
  --ease-silk: cubic-bezier(0.25,0.46,0.45,0.94);
}

/* SCREEN MANAGER */
.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center;
  overflow-y:auto; overflow-x:hidden;
  transition:opacity .80s var(--ease-silk), transform .80s var(--ease-silk);
  will-change:opacity,transform;
}
.screen.hidden    { opacity:0; pointer-events:none; transform:translateY(30px); }
.screen.slide-out { opacity:0; pointer-events:none; transform:translateY(-38px); }

/* AMBIENT */
.ambient {
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.amb-base {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 120% 45% at 50% -5%,  rgba(100,190,220,0.55) 0%, transparent 55%),
    radial-gradient(ellipse  60% 35% at 22% 30%,  rgba(180,230,242,0.28) 0%, transparent 52%),
    radial-gradient(ellipse  90% 60% at 55% 65%,  rgba(42,136,168,0.30)  0%, transparent 60%),
    linear-gradient(180deg,
      #0e2a3f 0%,
      #133248 22%,
      #153c58 48%,
      #154060 72%,
      #112e48 100%);
}
.surface-band {
  position:absolute;
  top:0; left:-10%; right:-10%; height:120px;
  background:linear-gradient(180deg,
    rgba(180,230,242,0.35) 0%,
    rgba(126,207,222,0.18) 45%,
    transparent 100%);
  filter:blur(2px);
  animation:surfBand 7s ease-in-out infinite alternate;
}
@keyframes surfBand {
  0%  { opacity:.60; transform:scaleY(1) translateY(0); }
  100%{ opacity:1;   transform:scaleY(1.15) translateY(6px); }
}
.caustics { position:absolute; inset:0; overflow:hidden; }
.shaft {
  position:absolute; top:0; width:2px;
  background:linear-gradient(180deg,
    rgba(255,255,255,0) 0%,
    rgba(200,238,248,0.30) 20%,
    rgba(180,230,242,0.14) 65%,
    transparent 100%);
  transform-origin:top center;
  animation:shaftSway var(--sd,11s) ease-in-out infinite alternate;
  animation-delay:var(--dl,0s);
  filter:blur(var(--blur,1.5px));
}
@keyframes shaftSway {
  0%  { transform:rotate(var(--r0,-4deg)) scaleY(1);    opacity:var(--op,.3); }
  100%{ transform:rotate(var(--r1, 5deg)) scaleY(1.12); opacity:calc(var(--op)*1.8); }
}
#sparkles { position:absolute; inset:0; pointer-events:none; }
.sp {
  position:absolute;
  background:rgba(255,255,255,var(--sop,.7));
  border-radius:50%;
  animation:spTwinkle var(--sd,2.5s) ease-in-out infinite;
  animation-delay:var(--dl,0s);
  filter:blur(var(--sb,.5px));
}
@keyframes spTwinkle {
  0%,100%{ opacity:0;            transform:scale(.6); }
  45%    { opacity:var(--sop,.7);transform:scale(1.2); }
  55%    { opacity:var(--sop,.7);transform:scale(1.4); }
}
.caustic-patch {
  position:absolute; border-radius:50%;
  background:rgba(180,230,242,var(--cop,.12));
  filter:blur(var(--cpb,18px));
  animation:cpDrift var(--cpd,14s) ease-in-out infinite alternate;
  animation-delay:var(--cpdl,0s);
}
@keyframes cpDrift {
  0%  { transform:translate(0,0) scale(1)   rotate(0deg); }
  100%{ transform:translate(var(--cpx,20px),var(--cpy,12px)) scale(1.2) rotate(8deg); }
}
#bubbles { position:absolute; inset:0; }
.bubble {
  position:absolute; border-radius:50%;
  border:1px solid rgba(200,238,248,0.35);
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.20) 0%, transparent 70%);
  animation:bubbleRise var(--br,18s) ease-in-out infinite;
  animation-delay:var(--bdl,0s);
}
@keyframes bubbleRise {
  0%  { transform:translateY(0) translateX(0) scale(1); opacity:0; }
  8%  { opacity:var(--bop,.35); }
  85% { opacity:var(--bop,.35); }
  100%{ transform:translateY(-110vh) translateX(var(--bx,8px)) scale(1.05); opacity:0; }
}
.wave-line {
  position:absolute; left:-8%; right:-8%;
  border-radius:50%; border:none;
  animation:waveFlow var(--wf,9s) ease-in-out infinite alternate;
  animation-delay:var(--wfl,0s);
}
@keyframes waveFlow {
  0%  { transform:scaleX(.85) translateX(-3%) scaleY(1);   opacity:var(--wop,.35); }
  100%{ transform:scaleX(1.12) translateX(2%) scaleY(1.4); opacity:calc(var(--wop,.35)*1.6); }
}
.water-floor {
  position:absolute; bottom:0; left:0; right:0; height:200px;
  background:linear-gradient(0deg,rgba(91,188,218,.08) 0%,transparent 100%);
  overflow:hidden;
}
.ripple {
  position:absolute; bottom:-50px; left:50%;
  transform:translateX(-50%);
  width:140%; height:90px; border-radius:50%;
  border:1px solid rgba(180,230,242,.09);
  animation:rippleExp 11s ease-out infinite;
}
.ripple:nth-child(2){ animation-delay:-3.6s; }
.ripple:nth-child(3){ animation-delay:-7.2s; }
@keyframes rippleExp {
  0%  { transform:translateX(-50%) scaleX(.2); opacity:.6; }
  100%{ transform:translateX(-50%) scaleX(1.8); opacity:0; }
}

/* ① CARD SCREEN */
#cardScreen { z-index:10; background:transparent; padding:0; }

.card-scene {
  width:100%; max-width:430px;
  min-height:100svh;
  display:flex; flex-direction:column; align-items:center;
  /* 仕様①: 上下余白バランス調整 */
  padding:44px var(--pad) 44px;
  position:relative; z-index:2;
}

.date-chip {
  font-family:'Cinzel', serif;
  font-size:9px; letter-spacing:3.5px;
  color:rgba(180,230,242,0.55);
  margin-bottom:28px;
  animation:fadeSlideDown .9s var(--ease-silk) forwards;
}

/* カードラッパー: 仕様⑤ボタン同幅のため共通幅を持つ */
.card-wrapper {
  width:100%; max-width:340px;
  display:flex; flex-direction:column; align-items:center;
}

/* 仕様①: カードサイズ max-width:340px / aspect-ratio:0.65 */
.stone-card {
  width:100%;
  aspect-ratio:0.65;
  border-radius:28px;
  position:relative; overflow:hidden; cursor:pointer;
  animation:cardReveal 1.1s var(--ease-silk) .15s both;
  box-shadow:
    0 0  60px rgba(91,188,218,.25),
    0 0 110px rgba(126,207,222,.12),
    0 40px 80px rgba(0,0,0,.45),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 0 0 1px rgba(180,230,242,.15);
  transition:box-shadow .4s ease, transform .18s ease;
}
.stone-card:hover {
  box-shadow:
    0 0  80px rgba(91,188,218,.35),
    0 0 150px rgba(126,207,222,.18),
    0 50px 90px rgba(0,0,0,.50),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 0 0 1px rgba(180,230,242,.22);
}
@keyframes cardReveal {
  0%  { opacity:0; transform:translateY(24px) scale(.97); }
  100%{ opacity:1; transform:translateY(0)    scale(1); }
}

/* STONE GRADIENT */
.card-stone {
  position:absolute; inset:0;
  animation:lariShift 11s ease-in-out infinite alternate;
}
@keyframes lariShift {
  0% {
    background:
      radial-gradient(ellipse 55% 32% at 42% 22%, rgba(255,255,255,.62) 0%,rgba(220,245,252,.40) 30%,transparent 62%),
      radial-gradient(ellipse 35% 20% at 72% 48%, rgba(255,255,255,.45) 0%,rgba(200,238,248,.28) 35%,transparent 58%),
      radial-gradient(ellipse 28% 16% at 22% 65%, rgba(255,255,255,.38) 0%,transparent 55%),
      radial-gradient(ellipse 20% 14% at 60% 82%, rgba(255,255,255,.30) 0%,transparent 52%),
      radial-gradient(ellipse 65% 50% at 30% 40%, rgba(126,207,222,.60) 0%,rgba(91,188,218,.42) 35%,transparent 65%),
      radial-gradient(ellipse 50% 42% at 75% 70%, rgba(91,188,218,.50) 0%,rgba(42,136,168,.32) 45%,transparent 65%),
      radial-gradient(ellipse 40% 30% at 55% 15%, rgba(176,228,239,.45) 0%,transparent 55%),
      radial-gradient(ellipse 75% 65% at 50% 80%, rgba(21,60,88,.85) 0%,rgba(14,42,63,.92) 55%,transparent 80%),
      linear-gradient(155deg,
        #c8eef7 0%, #8dd8ea 12%, #5bbcda 25%, #3a9aba 38%,
        #2a80a0 52%, #1e5a7a 65%, #153a58 80%, #0e2840 100%);
  }
  45% {
    background:
      radial-gradient(ellipse 58% 35% at 50% 18%, rgba(255,255,255,.68) 0%,rgba(220,245,252,.44) 32%,transparent 62%),
      radial-gradient(ellipse 30% 18% at 68% 44%, rgba(255,255,255,.50) 0%,rgba(200,238,248,.32) 38%,transparent 58%),
      radial-gradient(ellipse 32% 18% at 18% 60%, rgba(255,255,255,.42) 0%,transparent 55%),
      radial-gradient(ellipse 22% 15% at 64% 80%, rgba(255,255,255,.32) 0%,transparent 52%),
      radial-gradient(ellipse 70% 52% at 35% 38%, rgba(126,207,222,.65) 0%,rgba(91,188,218,.46) 38%,transparent 65%),
      radial-gradient(ellipse 52% 44% at 78% 68%, rgba(91,188,218,.55) 0%,rgba(42,136,168,.36) 48%,transparent 65%),
      radial-gradient(ellipse 44% 32% at 58% 12%, rgba(176,228,239,.50) 0%,transparent 55%),
      radial-gradient(ellipse 78% 68% at 48% 82%, rgba(21,60,88,.82) 0%,rgba(14,42,63,.90) 55%,transparent 80%),
      linear-gradient(160deg,
        #cdf0f8 0%, #92dced 12%, #62c8e0 25%, #42a8c8 38%,
        #2e8cae 52%, #205e80 65%, #163c5c 80%, #0e2840 100%);
  }
  100% {
    background:
      radial-gradient(ellipse 52% 30% at 38% 25%, rgba(255,255,255,.58) 0%,rgba(220,245,252,.38) 28%,transparent 60%),
      radial-gradient(ellipse 32% 20% at 75% 52%, rgba(255,255,255,.42) 0%,rgba(200,238,248,.26) 32%,transparent 56%),
      radial-gradient(ellipse 26% 14% at 25% 68%, rgba(255,255,255,.35) 0%,transparent 52%),
      radial-gradient(ellipse 18% 13% at 58% 84%, rgba(255,255,255,.28) 0%,transparent 50%),
      radial-gradient(ellipse 62% 48% at 28% 42%, rgba(126,207,222,.55) 0%,rgba(91,188,218,.38) 32%,transparent 62%),
      radial-gradient(ellipse 48% 40% at 72% 72%, rgba(91,188,218,.48) 0%,rgba(42,136,168,.28) 42%,transparent 62%),
      radial-gradient(ellipse 38% 28% at 52% 18%, rgba(176,228,239,.40) 0%,transparent 52%),
      radial-gradient(ellipse 72% 62% at 52% 78%, rgba(21,60,88,.88) 0%,rgba(14,42,63,.94) 55%,transparent 80%),
      linear-gradient(148deg,
        #c2ecf6 0%, #88d6e8 12%, #58b8d8 25%, #3898b8 38%,
        #2878a0 52%, #1a5878 65%, #123858 80%, #0c2640 100%);
  }
}

/* MARBLE VEINS */
.card-marble {
  position:absolute; inset:0; overflow:hidden;
  mix-blend-mode:screen;
}
.marble-vein {
  position:absolute; border-radius:40%;
  background:rgba(255,255,255,var(--mv-op,.12));
  filter:blur(var(--mv-b,10px));
  transform:rotate(var(--mv-r,0deg));
  animation:marbleFloat var(--mv-d,16s) ease-in-out infinite alternate;
  animation-delay:var(--mv-dl,0s);
}
@keyframes marbleFloat {
  0%  { transform:rotate(var(--mv-r,0deg)) translate(0,0) scale(1); opacity:var(--mv-op,.12); }
  100%{ transform:rotate(calc(var(--mv-r,0deg) + 6deg)) translate(var(--mv-tx,8px),var(--mv-ty,-5px)) scale(1.06); opacity:calc(var(--mv-op,.12)*1.5); }
}

/* GLITTER */
.card-glitter {
  position:absolute; inset:0;
  background-image:
    radial-gradient(2px   2px   at 18% 28%, rgba(255,255,255,.85) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 62% 21%, rgba(255,255,255,.70) 0%,transparent 100%),
    radial-gradient(3px   3px   at 38% 55%, rgba(200,238,248,.75) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 66%, rgba(255,255,255,.65) 0%,transparent 100%),
    radial-gradient(1px   1px   at 10% 75%, rgba(255,255,255,.55) 0%,transparent 100%),
    radial-gradient(3.5px 3.5px at 52% 14%, rgba(200,238,248,.80) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 88% 40%, rgba(255,255,255,.60) 0%,transparent 100%),
    radial-gradient(2px   2px   at 30% 86%, rgba(176,228,239,.55) 0%,transparent 100%),
    radial-gradient(2.5px 2.5px at 68% 78%, rgba(255,255,255,.65) 0%,transparent 100%),
    radial-gradient(1px   1px   at 44% 38%, rgba(255,255,255,.50) 0%,transparent 100%);
  animation:glitterShift 4s ease-in-out infinite alternate;
}
@keyframes glitterShift { 0%{opacity:.55} 100%{opacity:1} }

/* WAVE BANDS */
.card-wave {
  position:absolute; left:-25%; right:-25%;
  border-radius:50%; filter:blur(4px);
  animation:cWaveFlow var(--wd,9s) ease-in-out infinite; animation-delay:var(--wdl,0s);
}
.cw1 { top:26%; height:2.5px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.70),rgba(200,238,248,.55),rgba(255,255,255,.65),transparent);
  --wd:9s; }
.cw2 { top:46%; height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(176,228,239,.55),rgba(255,255,255,.60),transparent);
  --wd:12s; --wdl:-4s; }
.cw3 { top:66%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.40),rgba(176,228,239,.38),transparent);
  --wd:15s; --wdl:-8s; }
@keyframes cWaveFlow {
  0%,100%{ opacity:.18; transform:scaleX(.68) translateX(-10%); }
  50%     { opacity:1;   transform:scaleX(1.18) translateX(5%); }
}

.card-rim {
  position:absolute; inset:0; border-radius:28px;
  border:1px solid rgba(200,238,248,.35); pointer-events:none;
}
.card-rim::before {
  content:''; position:absolute; inset:1px; border-radius:27px;
  border:1px solid rgba(255,255,255,.10);
}

/* CARD INNER */
.card-inner {
  position:relative; z-index:5; height:100%;
  display:flex; flex-direction:column; padding:26px 22px 30px;
}
.ci-header { display:flex; align-items:center; gap:8px; margin-bottom:18px; }
.ci-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(200,238,248,.45),transparent); }
.ci-gem {
  width:5px; height:5px; transform:rotate(45deg);
  background:radial-gradient(circle,rgba(255,255,255,.95),rgba(176,228,239,.5));
  box-shadow:0 0 10px rgba(200,238,248,.6);
}
.ci-name { text-align:center; margin-bottom:14px; }
.ci-name-en {
  font-family:'Cinzel', serif; font-weight:300;
  font-size:22px; letter-spacing:5.5px;
  color:rgba(240,250,254,.95);
  text-shadow:0 0 25px rgba(200,238,248,.70),0 0 50px rgba(126,207,222,.30);
  display:block; margin-bottom:5px;
}
.ci-name-jp {
  font-size:10px; font-weight:200; letter-spacing:5px;
  color:rgba(180,230,242,.65); display:block;
}

/* ORB */
.ci-orb-wrap {
  flex:1; display:flex; align-items:center; justify-content:center; position:relative;
}
.ci-orb-glow {
  position:absolute; width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle,
    rgba(200,238,248,.30) 0%,rgba(91,188,218,.18) 40%,transparent 70%);
  filter:blur(22px);
  animation:orbGlow 5s ease-in-out infinite;
}
@keyframes orbGlow { 0%,100%{opacity:.45;transform:scale(1)} 50%{opacity:1;transform:scale(1.10)} }
.ci-orb {
  width:158px; height:158px; border-radius:50%;
  position:relative; overflow:hidden;
  animation:orbDrift 9s ease-in-out infinite;
  box-shadow:
    0 0 35px rgba(91,188,218,.35),
    0 0 70px rgba(126,207,222,.18),
    inset 0 -15px 35px rgba(14,40,60,.40),
    inset 0 8px 20px rgba(255,255,255,.15);
}
@keyframes orbDrift {
  0%,100%{ transform:translateY(0) rotate(0deg); }
  35%    { transform:translateY(-11px) rotate(.8deg); }
  70%    { transform:translateY(-5px) rotate(-.4deg); }
}
.orb-bg {
  position:absolute; inset:0; border-radius:50%;
  background:
    radial-gradient(ellipse 55% 44% at 32% 25%, rgba(255,255,255,.75) 0%,rgba(220,245,252,.55) 28%,transparent 55%),
    radial-gradient(ellipse 68% 60% at 55% 50%, rgba(126,207,222,.70) 0%,rgba(91,188,218,.52) 42%,transparent 68%),
    radial-gradient(ellipse 80% 80% at 50% 62%, rgba(21,58,85,.88) 0%,rgba(12,36,58,.95) 60%),
    radial-gradient(ellipse 30% 22% at 72% 38%, rgba(255,255,255,.50) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 22% 72%, rgba(42,136,168,.60) 0%,transparent 55%);
  animation:orbSurf 11s ease-in-out infinite alternate;
}
@keyframes orbSurf {
  0%  { filter:brightness(1)   saturate(1)   contrast(1); }
  100%{ filter:brightness(1.10) saturate(1.14) contrast(1.04); }
}
.orb-marble {
  position:absolute; inset:0; border-radius:50%; overflow:hidden;
}
.orb-marble::before, .orb-marble::after {
  content:''; position:absolute; border-radius:60%;
  background:rgba(255,255,255,0);
}
.orb-marble::before {
  width:120%; height:40%; top:28%; left:-12%;
  background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.32) 30%,rgba(220,245,252,.28) 55%,rgba(255,255,255,.22) 72%,transparent 100%);
  filter:blur(3px);
  animation:marbleSwirl 14s ease-in-out infinite alternate;
}
.orb-marble::after {
  width:80%; height:25%; top:52%; left:15%;
  background:linear-gradient(125deg,transparent 0%,rgba(255,255,255,.22) 40%,rgba(200,238,248,.18) 65%,transparent 100%);
  filter:blur(4px);
  animation:marbleSwirl 18s ease-in-out infinite alternate-reverse;
}
@keyframes marbleSwirl {
  0%  { transform:rotate(-6deg) scaleX(.9) translateX(-5%); opacity:.7; }
  100%{ transform:rotate(6deg)  scaleX(1.1) translateX(5%); opacity:1; }
}
.orb-hl {
  position:absolute; width:45%; height:32%; top:15%; left:16%;
  background:radial-gradient(ellipse,rgba(255,255,255,.35) 0%,transparent 70%);
  border-radius:50%; filter:blur(4px);
}
.orb-hl2 {
  position:absolute; width:18%; height:14%; top:12%; right:22%;
  background:radial-gradient(ellipse,rgba(255,255,255,.50) 0%,transparent 70%);
  border-radius:50%; filter:blur(2px);
  animation:hl2Pulse 6s ease-in-out infinite;
}
@keyframes hl2Pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
.orb-reflect {
  position:absolute; inset:0; border-radius:50%; overflow:hidden;
}
.orb-reflect::before, .orb-reflect::after {
  content:''; position:absolute;
  width:220%; height:1.5px; left:-60%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),rgba(200,238,248,.35),transparent);
  animation:refMove 10s ease-in-out infinite alternate;
}
.orb-reflect::before { top:40%; }
.orb-reflect::after  {
  top:55%; height:1px; animation-delay:-5s;
  background:linear-gradient(90deg,transparent,rgba(200,238,248,.32),rgba(255,255,255,.28),transparent);
}
@keyframes refMove {
  0%  { transform:translateX(-10%) skewY(-1.5deg); }
  100%{ transform:translateX(8%)   skewY(1.2deg); }
}

/* Keywords */
.ci-keywords { display:flex; justify-content:center; gap:8px; margin:18px 0 14px; flex-wrap:wrap; }
.ci-kw {
  font-size:9.5px; font-weight:300; letter-spacing:2.5px;
  color:rgba(200,238,248,.88);
  padding:4px 12px; border-radius:20px;
  border:1px solid rgba(200,238,248,.28);
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(6px);
}

/* 仕様③: メッセージ — 「」なし */
.ci-msgs { text-align:center; padding:0 2px; margin-bottom:18px; }
.ci-msg {
  font-size:11.5px; font-weight:200; line-height:2.1;
  color:rgba(240,250,254,.85); font-style:italic;
  text-shadow:0 0 16px rgba(126,207,222,.30);
}

/* 仕様②: フッター Crystal Message */
.ci-footer { display:flex; align-items:center; gap:8px; }
.ci-footer .ci-line { background:linear-gradient(90deg,transparent,rgba(200,238,248,.22),transparent); }
.ci-footer-lbl {
  font-family:'Cinzel', serif; font-size:7.5px; letter-spacing:2.5px;
  color:rgba(180,230,242,.32); white-space:nowrap;
}

/* Below card — 仕様⑤: ボタンをカードと同幅 */
.card-sub {
  margin-top:22px; text-align:center;
  width:100%; max-width:340px;
  animation:fadeSlideUp 1s var(--ease-silk) .6s both;
}
.card-sub-msg {
  font-size:12px; font-weight:200; letter-spacing:1.5px;
  color:rgba(232,246,250,.38); margin-bottom:20px; line-height:1.9;
}

/* 仕様⑤: CTA button — width:100% でカード同幅 */
.cta-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%;
  padding:15px 32px; border-radius:50px;
  border:1px solid rgba(200,238,248,.30);
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(12px);
  cursor:pointer; outline:none;
  font-family:'Noto Serif JP', serif;
  font-size:12px; font-weight:300; letter-spacing:2px;
  color:rgba(232,246,250,.72);
  transition:all .4s var(--ease-silk);
  position:relative; overflow:hidden; text-decoration:none;
}
.cta-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(200,238,248,.12) 0%,rgba(255,255,255,.08) 50%,rgba(126,207,222,.10) 100%);
  opacity:0; transition:opacity .4s ease;
}
.cta-btn:hover {
  border-color:rgba(200,238,248,.55);
  box-shadow:0 0 30px rgba(126,207,222,.20),inset 0 1px 0 rgba(255,255,255,.12);
  transform:translateY(-2px); color:rgba(240,250,254,.92);
}
.cta-btn:hover::before { opacity:1; }
.cta-btn:active { transform:translateY(0); }
.cta-icon { font-size:11px; color:rgba(200,238,248,.55); animation:waveSpin 12s linear infinite; }
@keyframes waveSpin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }

/* ② DETAIL SCREEN */
#detailScreen { z-index:9; background:transparent; padding:0; }
.detail-scene {
  width:100%; max-width:430px;
  min-height:100svh; position:relative; z-index:2;
  padding:0 0 68px;
}
.d-hero {
  position:relative; width:100%; padding:58px var(--pad) 44px;
  text-align:center;
  border-bottom:1px solid rgba(200,238,248,.08);
  animation:fadeSlideDown .9s var(--ease-silk) both;
}

/* 仕様④: ← カードに戻る (左上に配置) */
.d-back {
  position:absolute; top:22px; left:var(--pad);
  display:flex; align-items:center; gap:7px;
  font-size:10px; letter-spacing:2px; color:rgba(180,230,242,.48);
  cursor:pointer; border:none; background:transparent;
  font-family:'Noto Serif JP', serif; font-weight:300;
  transition:color .3s ease; outline:none;
}
.d-back:hover { color:rgba(200,238,248,.88); }

.d-mini-orb {
  width:94px; height:94px; border-radius:50%;
  margin:0 auto 24px; position:relative; overflow:hidden;
  box-shadow:
    0 0 36px rgba(91,188,218,.32),
    0 0 70px rgba(126,207,222,.16),
    inset 0 4px 12px rgba(255,255,255,.12);
  animation:orbDrift 9s ease-in-out infinite;
}
.d-title-en {
  font-family:'Cinzel', serif; font-weight:300;
  font-size:16px; letter-spacing:5.5px;
  color:rgba(232,246,250,.88);
  text-shadow:0 0 22px rgba(126,207,222,.52);
  display:block; margin-bottom:6px;
}
.d-title-jp {
  font-size:26px; font-weight:100; letter-spacing:4px;
  color:rgba(232,246,250,.92); display:block; margin-bottom:14px;
}
.d-subtitle {
  font-size:12px; font-weight:200; letter-spacing:1.5px;
  color:rgba(126,207,222,.70); line-height:1.9; font-style:italic;
}
.d-body { padding:0 var(--pad); }
.d-section { padding:36px 0 0; }
.d-label {
  font-family:'Cinzel', serif; font-size:8.5px;
  letter-spacing:3.5px; color:rgba(180,230,242,.45);
  margin-bottom:16px; display:flex; align-items:center; gap:10px;
}
.d-label::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(90deg,rgba(180,230,242,.35),transparent);
}
.d-traits { display:flex; flex-direction:column; gap:11px; }
.d-trait {
  display:flex; align-items:flex-start; gap:12px;
  padding:15px 16px; border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(200,238,248,.10);
  backdrop-filter:blur(8px);
  transition:all .38s var(--ease-silk);
}
.d-trait:hover {
  background:rgba(255,255,255,.08);
  border-color:rgba(200,238,248,.24);
  transform:translateX(5px);
}
.d-trait-dot {
  width:6px; height:6px; min-width:6px; margin-top:6px; border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.95),rgba(176,228,239,.5));
  box-shadow:0 0 8px rgba(200,238,248,.50);
}
.d-trait-text {
  font-size:13px; font-weight:200; letter-spacing:1px;
  color:rgba(232,246,250,.80); line-height:1.75;
}
.d-msg-card {
  margin-top:32px; padding:30px 24px;
  border-radius:22px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(200,238,248,.14);
  backdrop-filter:blur(12px);
  position:relative; overflow:hidden;
}
.d-msg-card::before {
  content:''; position:absolute; top:-60px; right:-50px;
  width:170px; height:170px; border-radius:50%;
  background:radial-gradient(circle,rgba(200,238,248,.10) 0%,transparent 70%);
  pointer-events:none;
}
.d-msg-card::after {
  content:''; position:absolute; bottom:-40px; left:-35px;
  width:130px; height:130px; border-radius:50%;
  background:radial-gradient(circle,rgba(91,188,218,.07) 0%,transparent 70%);
  pointer-events:none;
}
.d-msg-label {
  font-family:'Cinzel', serif; font-size:8px;
  letter-spacing:3.5px; color:rgba(180,230,242,.45);
  margin-bottom:16px; display:block;
}
.d-msg-text {
  font-size:14.5px; font-weight:100; line-height:2.2;
  color:rgba(232,246,250,.88); font-style:italic;
  text-shadow:0 0 20px rgba(126,207,222,.20);
}
.d-wave-div {
  margin:32px 0; display:flex; align-items:center; gap:12px;
}
.d-wave-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(200,238,248,.15),transparent); }
.d-wave-drop {
  width:5px; height:7px; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  background:rgba(200,238,248,.38);
  box-shadow:0 0 6px rgba(200,238,248,.28);
}
.d-closing {
  margin-top:26px; text-align:center; padding:0 8px;
}
.d-closing-text {
  font-size:10.5px; font-weight:200; letter-spacing:2px;
  color:rgba(180,230,242,.35); line-height:2;
}
.d-actions { margin-top:36px; display:flex; flex-direction:column; gap:14px; }
.btn-secondary {
  display:flex; align-items:center; justify-content:center; gap:10px;
  padding:16px 28px; border-radius:50px;
  border:1px solid rgba(200,238,248,.22);
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(12px);
  cursor:pointer; outline:none;
  font-family:'Noto Serif JP', serif;
  font-size:12.5px; font-weight:300; letter-spacing:2px;
  color:rgba(232,246,250,.65);
  transition:all .38s var(--ease-silk); text-decoration:none;
}
.btn-secondary:hover {
  border-color:rgba(200,238,248,.45);
  background:rgba(255,255,255,.09);
  box-shadow:0 0 24px rgba(126,207,222,.14);
  color:rgba(240,250,254,.90); transform:translateY(-2px);
}
.btn-icon { color:rgba(200,238,248,.50); font-size:11px; }

/* KEYFRAMES */
@keyframes fadeSlideDown {
  0%  { opacity:0; transform:translateY(-18px); }
  100%{ opacity:1; transform:translateY(0); }
}
@keyframes fadeSlideUp {
  0%  { opacity:0; transform:translateY(18px); }
  100%{ opacity:1; transform:translateY(0); }
}
.scroll-reveal {
  opacity:0; transform:translateY(20px);
  transition:opacity .75s ease, transform .75s ease;
}
.scroll-reveal.visible { opacity:1; transform:translateY(0); }
.ptcl {
  position:fixed; pointer-events:none; z-index:200; border-radius:50%;
  animation:ptclBurst 1.7s var(--ease-silk) forwards;
}
@keyframes ptclBurst {
  0%  { transform:translate(0,0) scale(1); opacity:1; }
  100%{ transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; }
}
</style>
</head>
<body>

<!-- AMBIENT -->
<div class="ambient">
  <div class="amb-base"></div>
  <div class="surface-band"></div>
  <div class="caustics" id="caustics"></div>
  <div class="caustic-patch" style="width:350px;height:200px;top:2%;left:-60px;--cop:.14;--cpb:30px;--cpd:16s;--cpx:28px;--cpy:12px;"></div>
  <div class="caustic-patch" style="width:280px;height:180px;top:15%;right:-40px;--cop:.10;--cpb:25px;--cpd:21s;--cpdl:-8s;--cpx:-20px;--cpy:8px;"></div>
  <div class="caustic-patch" style="width:200px;height:140px;top:50%;left:10%;--cop:.08;--cpb:22px;--cpd:27s;--cpdl:-14s;--cpx:16px;--cpy:-10px;"></div>
  <div id="sparkles"></div>
  <div id="bubbles"></div>
  <div class="wave-line" style="top:1.5px;height:2px;background:linear-gradient(90deg,transparent,rgba(200,238,248,.45),rgba(255,255,255,.55),rgba(200,238,248,.45),transparent);filter:blur(1px);--wf:8s;--wop:.55;"></div>
  <div class="wave-line" style="top:6px;height:1px;background:linear-gradient(90deg,transparent,rgba(180,230,242,.25),transparent);filter:blur(1.5px);--wf:11s;--wfl:-4s;--wop:.30;"></div>
  <div class="water-floor">
    <div class="ripple"></div><div class="ripple"></div><div class="ripple"></div>
  </div>
</div>

<!-- ① CARD SCREEN -->
<div class="screen" id="cardScreen">
  <div class="card-scene">

    <div class="date-chip" id="dateChip">DAILY READING</div>

    <!-- card-wrapper が 340px 幅を保持 → ボタンも同幅 -->
    <div class="card-wrapper" id="cardWrapper">
      <div class="stone-card" id="stoneCard">
        <div class="card-stone"></div>
        <div class="card-marble">
          <div class="marble-vein" style="width:200px;height:55px;top:18%;left:-18%;--mv-r:-18deg;--mv-op:.18;--mv-b:9px;--mv-d:15s;--mv-tx:16px;--mv-ty:-6px;"></div>
          <div class="marble-vein" style="width:140px;height:38px;top:44%;right:-8%;--mv-r:12deg;--mv-op:.14;--mv-b:7px;--mv-d:19s;--mv-dl:-6s;--mv-tx:-12px;--mv-ty:-4px;"></div>
          <div class="marble-vein" style="width:100px;height:28px;top:68%;left:12%;--mv-r:-8deg;--mv-op:.12;--mv-b:6px;--mv-d:23s;--mv-dl:-11s;--mv-tx:8px;--mv-ty:5px;"></div>
          <div class="marble-vein" style="width:70px;height:22px;top:34%;left:52%;--mv-r:22deg;--mv-op:.10;--mv-b:5px;--mv-d:17s;--mv-dl:-3s;--mv-tx:-5px;--mv-ty:-3px;"></div>
          <div class="marble-vein" style="width:55px;height:18px;top:82%;right:20%;--mv-r:-5deg;--mv-op:.10;--mv-b:5px;--mv-d:20s;--mv-dl:-8s;--mv-tx:6px;--mv-ty:-4px;"></div>
        </div>
        <div class="card-glitter"></div>
        <div class="card-wave cw1"></div>
        <div class="card-wave cw2"></div>
        <div class="card-wave cw3"></div>
        <div class="card-rim"></div>

        <div class="card-inner">
          <div class="ci-header">
            <div class="ci-line"></div>
            <div class="ci-gem"></div>
            <div class="ci-line"></div>
          </div>

          <div class="ci-name">
            <span class="ci-name-en">LARIMAR</span>
            <span class="ci-name-jp">ラ リ マ ー</span>
          </div>

          <div class="ci-orb-wrap">
            <div class="ci-orb-glow"></div>
            <div class="ci-orb">
              <div class="orb-bg"></div>
              <div class="orb-marble"></div>
              <div class="orb-hl"></div>
              <div class="orb-hl2"></div>
              <div class="orb-reflect"></div>
            </div>
          </div>

          <div class="ci-keywords">
            <span class="ci-kw">癒 し</span>
            <span class="ci-kw">軽 や か</span>
            <span class="ci-kw">解 放</span>
          </div>

          <!-- 仕様③: 「」なし -->
          <div class="ci-msgs">
            <p class="ci-msg">そんなに力を入れなくても、大丈夫</p>
            <p class="ci-msg">ふっと緩んだ瞬間、すべては流れ出す</p>
          </div>

          <!-- 仕様②: Crystal Message -->
          <div class="ci-footer">
            <div class="ci-line"></div>
            <span class="ci-footer-lbl">Crystal Message</span>
            <div class="ci-line"></div>
          </div>
        </div>
      </div><!-- /stone-card -->

      <!-- card-sub は card-wrapper の中 → 同幅 -->
      <div class="card-sub">
        <p class="card-sub-msg">この石は、今のあなたに応えています</p>
        <!-- 仕様⑤: width:100% でカードと同幅 -->
        <button class="cta-btn" id="openDetailBtn">
          <span class="cta-icon">〜</span>
          この光を、もう少し深く知る？
          <span class="cta-icon">〜</span>
        </button>
      </div>

    </div><!-- /card-wrapper -->

  </div>
</div>

<!-- ② DETAIL SCREEN -->
<div class="screen hidden" id="detailScreen">
  <div class="detail-scene">
    <div class="d-hero">
      <!-- 仕様④: ← カードに戻る -->
      <button class="d-back" id="backBtn">← カードに戻る</button>
      <div class="d-mini-orb">
        <div class="orb-bg"></div>
        <div class="orb-marble"></div>
        <div class="orb-hl"></div>
        <div class="orb-hl2"></div>
        <div class="orb-reflect"></div>
      </div>
      <span class="d-title-en">LARIMAR</span>
      <span class="d-title-jp">ラリマー</span>
      <p class="d-subtitle">心を軽やかにほどき、本来の流れへと戻す石</p>
    </div>

    <div class="d-body">
      <div class="d-section scroll-reveal">
        <div class="d-label">Energy Features</div>
        <div class="d-traits">
          <div class="d-trait">
            <div class="d-trait-dot"></div>
            <p class="d-trait-text">心をやわらかくゆるめる</p>
          </div>
          <div class="d-trait">
            <div class="d-trait-dot"></div>
            <p class="d-trait-text">執着を軽やかに手放す</p>
          </div>
          <div class="d-trait">
            <div class="d-trait-dot"></div>
            <p class="d-trait-text">自然体の流れに静かに戻る</p>
          </div>
        </div>
      </div>

      <div class="d-wave-div scroll-reveal">
        <div class="d-wave-line"></div>
        <div class="d-wave-drop"></div>
        <div class="d-wave-line"></div>
      </div>

      <div class="d-msg-card scroll-reveal">
        <span class="d-msg-label">Message for You</span>
        <p class="d-msg-text">
          少し肩の力を抜いてみて。<br>
          思っているより、すべてはスムーズに流れていく
        </p>
      </div>

      <div class="d-closing scroll-reveal">
        <p class="d-closing-text">〜 &nbsp; あなたはもう、十分に頑張ってきた &nbsp; 〜</p>
      </div>

      <div class="d-actions scroll-reveal">
        <button class="btn-secondary" id="redrawBtn">
          <span class="btn-icon">〜</span>
          もう一度引く
          <span class="btn-icon">〜</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
/* Caustic shafts */
const caustics = document.getElementById('caustics');
[
  { left:'5%',  height:'55%', op:'.28', r0:'-5deg', r1: '3deg', sd:'13s', dl: '0s',  blur:'2px' },
  { left:'18%', height:'42%', op:'.20', r0: '2deg', r1:'-4deg', sd:'17s', dl:'-5s',  blur:'2.5px' },
  { left:'34%', height:'68%', op:'.34', r0:'-3deg', r1: '5deg', sd:'11s', dl:'-9s',  blur:'1.5px' },
  { left:'52%', height:'38%', op:'.18', r0: '4deg', r1:'-2deg', sd:'19s', dl:'-3s',  blur:'3px' },
  { left:'68%', height:'58%', op:'.26', r0:'-4deg', r1: '4deg', sd:'14s', dl:'-7s',  blur:'2px' },
  { left:'82%', height:'44%', op:'.16', r0: '3deg', r1:'-4deg', sd:'21s', dl:'-12s', blur:'3.5px' },
  { left:'92%', height:'32%', op:'.12', r0:'-2deg', r1: '3deg', sd:'25s', dl:'-16s', blur:'4px' },
].forEach(d => {
  const el = document.createElement('div');
  el.className = 'shaft';
  el.style.cssText = `left:${d.left};height:${d.height};--op:${d.op};--r0:${d.r0};--r1:${d.r1};--sd:${d.sd};--dl:${d.dl};--blur:${d.blur};`;
  caustics.appendChild(el);
});

/* Sparkles */
const spEl = document.getElementById('sparkles');
for (let i = 0; i < 55; i++) {
  const s = document.createElement('div');
  s.className = 'sp';
  const sz = Math.random() * 3 + 1;
  s.style.cssText = `
    width:${sz}px;height:${sz}px;
    top:${Math.random()*25}%;
    left:${Math.random()*100}%;
    --sd:${(Math.random()*3+1.5).toFixed(1)}s;
    --dl:${(Math.random()*5).toFixed(1)}s;
    --sop:${(Math.random()*0.55+0.35).toFixed(2)};
    --sb:${Math.random()<0.5?'0px':'0.5px'};
  `;
  spEl.appendChild(s);
}

/* Bubbles */
const bubblesEl = document.getElementById('bubbles');
for (let i = 0; i < 18; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const sz = Math.random() * 10 + 3;
  b.style.cssText = `
    width:${sz}px;height:${sz}px;
    bottom:${Math.random()*15}%;
    left:${Math.random()*96}%;
    --br:${(Math.random()*20+14).toFixed(1)}s;
    --bdl:${(Math.random()*14).toFixed(1)}s;
    --bop:${(Math.random()*0.30+0.08).toFixed(2)};
    --bx:${((Math.random()-0.5)*50).toFixed(0)}px;
  `;
  bubblesEl.appendChild(b);
}

/* Date */
document.getElementById('dateChip').textContent =
  new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) + '  ·  DAILY READING';

/* Card tilt */
const card    = document.getElementById('stoneCard');
const wrapper = document.getElementById('cardWrapper');
function applyTilt(x,y,w,h){
  const cx=x/w-.5,cy=y/h-.5;
  card.style.transform=`rotateY(${cx*10}deg) rotateX(${-cy*8}deg)`;
}
wrapper.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();applyTilt(e.clientX-r.left,e.clientY-r.top,r.width,r.height);});
wrapper.addEventListener('mouseleave',()=>{card.style.transform='rotateY(0) rotateX(0)';});
wrapper.addEventListener('touchmove',e=>{const t=e.touches[0],r=card.getBoundingClientRect();applyTilt(t.clientX-r.left,t.clientY-r.top,r.width,r.height);},{passive:true});
wrapper.addEventListener('touchend',()=>{card.style.transform='rotateY(0) rotateX(0)';});

/* Particles */
function burst(x,y,n=14){
  const cols=['rgba(200,238,248,.90)','rgba(255,255,255,.80)','rgba(176,228,239,.85)','rgba(91,188,218,.75)','rgba(240,250,254,.70)'];
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='ptcl';
    const a=(i/n)*Math.PI*2,d=45+Math.random()*90,sz=Math.random()*4.5+1.5;
    p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-duration:${(.85+Math.random()*.9).toFixed(2)}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1800);
  }
}

/* Screen transitions */
const cardScreen=document.getElementById('cardScreen');
const detailScreen=document.getElementById('detailScreen');

function goToDetail(e){
  const r=e.currentTarget.getBoundingClientRect();
  burst(r.left+r.width/2,r.top+r.height/2);
  cardScreen.classList.add('slide-out');
  setTimeout(()=>{
    cardScreen.classList.add('hidden');
    cardScreen.classList.remove('slide-out');
    detailScreen.classList.remove('hidden');
    detailScreen.scrollTop=0;
    initReveal();
  },460);
}
function goToCard(){
  detailScreen.classList.add('slide-out');
  setTimeout(()=>{
    detailScreen.classList.add('hidden');
    detailScreen.classList.remove('slide-out');
    cardScreen.classList.remove('hidden');
  },460);
}

document.getElementById('openDetailBtn').addEventListener('click',goToDetail);
document.getElementById('backBtn').addEventListener('click',goToCard);
document.getElementById('redrawBtn').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  burst(r.left+r.width/2,r.top+r.height/2,10);
  goToCard();
});

/* Scroll reveal */
function initReveal(){
  const els=detailScreen.querySelectorAll('.scroll-reveal');
  els.forEach(el=>el.classList.remove('visible'));
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(en=>{if(en.isIntersecting){en.target.classList.add('visible');obs.unobserve(en.target);}});
  },{threshold:.12});
  els.forEach(el=>obs.observe(el));
  setTimeout(()=>els.forEach(el=>{
    if(el.getBoundingClientRect().top<window.innerHeight*1.1)el.classList.add('visible');
  }),80);
}
detailScreen.addEventListener('scroll',()=>{
  detailScreen.querySelectorAll('.scroll-reveal:not(.visible)').forEach(el=>{
    if(el.getBoundingClientRect().top<window.innerHeight*1.05)el.classList.add('visible');
  });
});
</script>
